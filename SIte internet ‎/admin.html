<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Admin | Terminal Local</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --bg-sidebar: #0c0c0c;
            --bg-card: #141414;
            --accent: #5865F2;
            --text-main: #ffffff;
            --text-muted: #86868b;
            --border: #1d1d1f;
            --success: #32d74b;
            --warning: #ff9f0a;
            --danger: #ff3b30;
        }

        body {
            background: var(--bg-dark); color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif; margin: 0;
            display: flex; height: 100vh; overflow: hidden;
        }

        .sidebar {
            width: 260px; background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 20px;
        }

        .logo { font-weight: 900; font-size: 1.2rem; margin-bottom: 35px; letter-spacing: 1px; }
        .logo span { color: var(--accent); }

        .nav-group { margin-bottom: 30px; }
        .nav-group h3 { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; }

        .nav-link {
            padding: 12px 15px; border-radius: 12px; cursor: pointer;
            transition: 0.3s; font-size: 0.85rem; margin-bottom: 4px;
            display: flex; align-items: center; gap: 10px; color: var(--text-muted);
        }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-link.active { background: var(--accent); color: white; font-weight: 700; }

        .viewport { flex: 1; display: flex; flex-direction: column; position: relative; }

        .header {
            height: 70px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px;
            background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(10px);
        }

        .content-area { padding: 40px; overflow-y: auto; flex: 1; display: none; }
        .content-area.active { display: block; animation: slideUp 0.4s ease; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid-dash { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        .card { 
            background: var(--bg-card); border-radius: 24px; padding: 25px; 
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .order-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: #000; border-radius: 14px; margin-bottom: 10px; border: 1px solid var(--border);
        }

        .chat-container { height: 100%; display: flex; flex-direction: column; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 16px; font-size: 0.9rem; line-height: 1.5; position: relative; }
        .bubble.admin { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .bubble.client { align-self: flex-start; background: #1d1d1f; color: white; border-bottom-left-radius: 4px; }
        .bubble-meta { font-size: 0.6rem; opacity: 0.6; margin-bottom: 4px; font-weight: 700; }

        .chat-input-bar { padding: 25px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
        .chat-input-bar input {
            flex: 1; background: #111; border: 1px solid var(--border);
            padding: 14px 20px; border-radius: 14px; color: white; outline: none; transition: 0.3s;
        }
        .chat-input-bar input:focus { border-color: var(--accent); }
        .btn-action { background: var(--text-main); color: black; border: none; padding: 0 25px; border-radius: 14px; font-weight: 800; cursor: pointer; }

        .stat-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">SENTINEL<span>ADMIN</span></div>
        
        <div class="nav-group">
            <h3>Vue d'ensemble</h3>
            <div class="nav-link active" id="nav-dash" onclick="switchTab('dash', this)">📊 Dashboard</div>
            <div class="nav-link" id="nav-projects" onclick="switchTab('projects', this)">🚀 Projets / Push</div>
        </div>

        <div class="nav-group">
            <h3>Support Direct</h3>
            <div id="sidebar-contacts"></div>
        </div>

        <div style="margin-top: auto;">
            <button onclick="logout()" style="width:100%; padding:10px; background:none; border:1px solid var(--danger); color:var(--danger); border-radius:10px; cursor:pointer; font-weight:700; font-size:0.7rem;">LOGOUT</button>
        </div>
    </nav>

    <main class="viewport">
        <header class="header">
            <div id="current-tab-title" style="font-weight: 800; letter-spacing: -0.5px;">Dashboard</div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span id="live-indicator" style="color: var(--success); font-size: 0.7rem; font-weight: 800;">● LOCALHOST_ACTIVE</span>
            </div>
        </header>

        <section id="tab-dash" class="content-area active">
            <div class="grid-dash">
                <div class="card">
                    <h2 style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 20px;">📦 DERNIÈRES COMMANDES</h2>
                    <div id="dash-orders-list"></div>
                </div>

                <div class="card">
                    <h2 style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 20px;">📅 PLANNING VISIO</h2>
                    <div id="dash-rdv-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
                </div>

                <div class="card">
                    <h2 style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 20px;">📈 ANALYTICS PIPELINE</h2>
                    <div style="height: 200px;"><canvas id="miniChart"></canvas></div>
                </div>
            </div>
        </section>

        <section id="tab-projects" class="content-area">
            <div class="card" style="max-width: 600px;">
                <h2 style="font-size: 0.8rem; color: var(--text-muted);">MISE À JOUR PORTAIL CLIENT</h2>
                <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                    <input type="text" id="p-name" placeholder="Nom du projet actif">
                    <input type="number" id="p-percent" placeholder="Progression (ex: 85)">
                    <input type="text" id="p-deadline" placeholder="Deadline (ex: Fin Mai)">
                    <button class="btn-action" onclick="savePortalData()" style="height: 50px; background: var(--accent); color: white;">PUSH SYNCHRONISATION</button>
                </div>
            </div>
        </section>

        <section id="tab-chat" class="content-area" style="padding: 0;">
            <div class="chat-container">
                <div id="chat-flow"></div>
                <div class="chat-input-bar">
                    <input type="text" id="msg-input" placeholder="Écrire à ce client..." onkeypress="if(event.key==='Enter') sendMsg()">
                    <button class="btn-action" onclick="sendMsg()">SEND</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        let currentClient = "";

        // --- SÉCURITÉ D'ACCÈS ---
        function checkAccess() {
            const secretUrl = "http://127.0.0.1:5501/admin.html";
            if (window.location.href !== secretUrl) {
                document.body.innerHTML = `
                    <div style="background:#000; color:red; height:100vh; display:flex; align-items:center; justify-content:center; font-family:sans-serif; flex-direction:column; text-align:center; padding:20px;">
                        <h1 style="font-size:4rem; margin:0;">403</h1>
                        <h2 style="letter-spacing:2px;">ACCÈS INTERDIT</h2>
                        <p style="color:#444; max-width:400px;">Ce terminal d'administration est verrouillé. L'accès n'est autorisé que via le port local sécurisé.</p>
                    </div>
                `;
                return false;
            }
            return true;
        }

        window.onload = () => {
            if (!checkAccess()) return;

            initApp();
            refreshAll(); // Premier rendu
            initChart();
            
            // --- ACTUALISATION TOUTES LES SECONDES ---
            setInterval(refreshAll, 1000);
        };

        function refreshAll() {
            renderDashboard();
            renderAppointments();
            if(currentClient) renderChat();
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.content-area').forEach(a => a.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            document.getElementById('tab-' + tabId).classList.add('active');
            if(el) el.classList.add('active');
            
            const titles = { 'dash': 'Dashboard', 'projects': 'Pilotage Projets', 'chat': 'Support Direct' };
            document.getElementById('current-tab-title').innerText = titles[tabId] || "Support";
        }

        function renderDashboard() {
            const orders = JSON.parse(localStorage.getItem('devpro_pending_orders')) || [];
            const list = document.getElementById('dash-orders-list');
            
            list.innerHTML = orders.length ? orders.slice(0, 4).map(o => `
                <div class="order-item">
                    <div>
                        <div style="font-weight:700; font-size:0.85rem;">${o.projet}</div>
                        <div style="font-size:0.65rem; color:var(--text-muted);">${o.client}</div>
                    </div>
                    <button class="stat-badge" style="background:var(--accent); border:none; color:white; cursor:pointer;" onclick="openChat('${o.client}')">CHAT</button>
                </div>
            `).join('') : '<p style="font-size:0.7rem; color:var(--text-muted); text-align:center;">Aucune commande.</p>';

            // Contacts Sidebar
            let allClients = orders.map(o => o.client);
            for (let i = 0; i < localStorage.length; i++) {
                if (localStorage.key(i).startsWith('rdv-')) {
                    allClients.push(localStorage.getItem(localStorage.key(i)));
                }
            }
            const uniqueClients = [...new Set(allClients)];
            document.getElementById('sidebar-contacts').innerHTML = uniqueClients.map(c => `
                <div class="nav-link" onclick="openChat('${c}')">👤 ${c.split('@')[0]}</div>
            `).join('');
        }

        function renderAppointments() {
            const container = document.getElementById('dash-rdv-list');
            let appointments = [];

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('rdv-')) {
                    const clientEmail = localStorage.getItem(key);
                    const parts = key.split('-'); 
                    appointments.push({
                        id: key,
                        date: `${parts[3]}/${parts[2]}/${parts[1]}`,
                        time: parts[4],
                        client: clientEmail
                    });
                }
            }

            if (appointments.length === 0) {
                container.innerHTML = `<p style="color:var(--text-muted); font-size:0.75rem; text-align:center;">Aucun rendez-vous.</p>`;
                return;
            }

            container.innerHTML = appointments.map(app => `
                <div class="order-item" style="border-left: 3px solid var(--success);">
                    <div style="flex: 1;">
                        <div style="font-weight:800; font-size:0.8rem; color:var(--success);">${app.date} - ${app.time}</div>
                        <div style="font-size:0.7rem; color:var(--text-main); margin-top:2px;">${app.client}</div>
                    </div>
                    <div style="display: flex; gap: 5px;">
                        <a href="https://meet.google.com/new" target="_blank" class="stat-badge" style="background:var(--bg-dark); border:1px solid var(--border); color:white; text-decoration:none;">JOIN</a>
                        <button onclick="deleteRdv('${app.id}')" class="stat-badge" style="background:none; border:1px solid var(--danger); color:var(--danger); cursor:pointer;">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteRdv(id) {
            if(confirm("Supprimer ce rendez-vous ?")) {
                localStorage.removeItem(id);
                renderAppointments();
            }
        }

        function openChat(email) {
            currentClient = email;
            switchTab('chat', document.getElementById('nav-dash'));
            document.getElementById('current-tab-title').innerText = "Chat : " + email;
            renderChat();
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            if(!input.value.trim() || !currentClient) return;

            const history = JSON.parse(localStorage.getItem('chat_' + currentClient)) || [];
            history.push({
                sender: 'ADMIN',
                text: input.value,
                time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})
            });
            localStorage.setItem('chat_' + currentClient, JSON.stringify(history));
            input.value = "";
            renderChat();
        }

        function renderChat() {
            const box = document.getElementById('chat-flow');
            const history = JSON.parse(localStorage.getItem('chat_' + currentClient)) || [];
            box.innerHTML = history.map(m => `
                <div class="bubble ${m.sender === 'ADMIN' ? 'admin' : 'client'}">
                    <div class="bubble-meta">${m.sender} • ${m.time}</div>
                    ${m.text}
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }

        function savePortalData() {
            localStorage.setItem('admin_proj_name', document.getElementById('p-name').value);
            localStorage.setItem('admin_proj_percent', document.getElementById('p-percent').value);
            localStorage.setItem('admin_proj_deadline', document.getElementById('p-deadline').value);
            alert("✅ Données poussées vers le portail client.");
        }

        function initApp() {
            document.getElementById('p-name').value = localStorage.getItem('admin_proj_name') || "";
            document.getElementById('p-percent').value = localStorage.getItem('admin_proj_percent') || "";
            document.getElementById('p-deadline').value = localStorage.getItem('admin_proj_deadline') || "";
        }

        function initChart() {
            const ctx = document.getElementById('miniChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven'],
                    datasets: [{
                        label: 'Ventes',
                        data: [12, 19, 15, 25, 22],
                        borderColor: '#5865F2',
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 0
                    }]
                },
                options: { 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#444' } } }
                }
            });
        }

        function logout() {
            localStorage.removeItem('userAccountEmail');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
