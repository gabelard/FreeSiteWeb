<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visio & Réservation | DevPro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://meet.jit.si/external_api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --accent: #007aff;
            --primary-light: #00d4ff;
            --accent-glow: rgba(0, 122, 255, 0.3);
            --bg: #000000;
            --card: rgba(15, 15, 15, 0.8);
            --text-main: #ffffff;
            --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.08);
            --danger: #ff3b30;
            --success: #32d74b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #001d3d, var(--bg));
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- EFFET CURSEUR GLOW --- */
        .cursor-glow { 
            position: fixed; width: 600px; height: 600px; 
            background: radial-gradient(circle, rgba(0, 122, 255, 0.1) 0%, transparent 70%); 
            border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); 
            z-index: 0; transition: transform 0.05s ease-out; 
        }

        /* --- ACCESSIBILITÉ & FOCUS --- */
        button:focus, input:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* --- NAVIGATION --- */
        nav {
            width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100; box-sizing: border-box; background: rgba(0,0,0,0.5);
        }
        .logo { font-weight: 800; font-size: 1.4rem; text-decoration: none; color: white; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .nav-links a { color: var(--text-dim); text-decoration: none; margin-left: 25px; font-size: 0.9rem; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: white; }
        
        .btn-login-nav { 
            background: white; color: black; border: none; padding: 10px 20px; 
            border-radius: 12px; font-weight: 700; cursor: pointer; margin-left: 25px; transition: 0.3s;
        }

        /* --- FORMULAIRES & MODALES --- */
        .container { width: 100%; max-width: 550px; padding: 60px 20px; animation: fadeIn 0.8s ease-out; position: relative; z-index: 1; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #calendar-container, #bookingForm { 
            background: var(--card); padding: 30px; border-radius: 35px; border: 1px solid var(--border);
            backdrop-filter: blur(20px); margin-bottom: 20px;
        }

        .forgot-pass {
            display: inline-block; width: 100%; text-align: right; margin-bottom: 20px;
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.4); cursor: pointer; transition: 0.4s;
        }
        .forgot-pass:hover { color: var(--primary-light); text-shadow: 0 0 8px var(--accent-glow); transform: translateX(-5px); }

        input { width: 100%; padding: 20px; border-radius: 18px; border: 1px solid var(--border); background: #000; color: white; margin-bottom: 15px; box-sizing: border-box; }
        
        .btn-primary, .btn-action { 
            background: linear-gradient(90deg, var(--accent), var(--primary-light)); color: white; padding: 18px; border-radius: 16px; 
            font-weight: 800; border: none; cursor: pointer; width: 100%; transition: 0.3s;
        }

        /* --- CALENDRIER --- */
        #daysGrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .grid-header { font-size: 0.7rem; font-weight: 800; color: #444; text-align: center; margin-bottom: 10px; text-transform: uppercase; }
        #daysGrid div { 
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border-radius: 15px; font-size: 0.95rem; font-weight: 600;
            transition: 0.2s; color: var(--text-dim);
        }
        #daysGrid div.selected { background: var(--accent) !important; color: white !important; box-shadow: 0 0 25px var(--accent-glow); }
        #daysGrid div.disabled { color: #222; cursor: not-allowed; opacity: 0.4; }

        #timeSlotGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px; }
        .time-btn { padding: 20px; border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: white; border-radius: 20px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .time-btn.booked { border-color: var(--success); color: var(--success); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .auth-modal { background: #0a0a0a; border: 1px solid var(--border); padding: 40px; border-radius: 32px; width: 90%; max-width: 400px; text-align: center; }
        
        dialog { background: #0f0f0f; border: 1px solid var(--border); border-radius: 40px; padding: 45px; color: white; width: 90%; max-width: 420px; }
        .hidden { display: none; }
        #visio-container { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; background: #000; z-index: 9999; }
    </style>
</head>
<body>

<div class="cursor-glow" id="glow"></div>

<nav>
    <a href="index.html" class="logo">Free<span>Site</span>Web</a>
    <div class="nav-links">
        <a href="services.html">Expertise</a>
        <a href="boutique.html">Boutique</a>
        <a href="contact.html">Contact</a>
        <button onclick="openAuth()" class="btn-login-nav">Espace Client</button>
    </div>
</nav>

<div class="container" id="main-ui">
    <header style="text-align: center; margin-bottom: 50px;">
        <h1 style="font-size: 3rem; font-weight: 800; letter-spacing: -3px;">Free<span>Site</span>Web</h1>
        <p style="color: var(--text-dim);">Sélectionnez une date pour votre session d'ingénierie.</p>
    </header>

    <div id="calendar-container">
        <div class="calendar-nav" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <button onclick="changeMonth(-1)" style="background: rgba(255,255,255,0.03); color: white; border: 1px solid var(--border); width: 45px; height: 45px; border-radius: 15px; cursor: pointer;">❮</button>
            <div id="monthDisplay" style="font-size: 1.2rem; font-weight: 800;"></div>
            <button onclick="changeMonth(1)" style="background: rgba(255,255,255,0.03); color: white; border: 1px solid var(--border); width: 45px; height: 45px; border-radius: 15px; cursor: pointer;">❯</button>
        </div>
        <div id="daysGrid"></div>
    </div>

    <div id="bookingForm" style="display:none;">
        <h3 id="selectedDateText" style="margin: 0; font-weight: 800; color: var(--accent);"></h3>
        <div id="timeSlotGrid"></div>
    </div>
</div>

<div id="auth-overlay" class="modal-overlay">
    <div class="auth-modal">
        <div id="step-login">
            <h2 style="font-weight: 900; margin-bottom: 25px;">Connexion Client</h2>
            <input type="email" id="login-user" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Mot de passe">
            <span class="forgot-pass" onclick="switchStep('step-forgot')">Mot de passe oublié ?</span>
            <button onclick="handleLogin()" class="btn-primary">Accéder à l'espace</button>
            <p style="font-size: 0.8rem; color: #444; margin-top: 20px;">Pas encore client ? <span onclick="switchStep('step-register')" style="color: var(--accent); cursor: pointer;">S'inscrire</span></p>
        </div>

        <div id="step-register" class="hidden">
            <h2 style="font-weight: 900; margin-bottom: 25px;">Rejoindre DevPro</h2>
            <input type="text" id="reg-name" placeholder="Nom complet">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-password" placeholder="Mot de passe (6+ car.)">
            <button onclick="handleRegister()" class="btn-primary">Créer mon compte</button>
            <p style="font-size: 0.8rem; color: #444; margin-top: 20px;"><span onclick="switchStep('step-login')" style="color: var(--accent); cursor: pointer;">Retour</span></p>
        </div>

        <div id="step-forgot" class="hidden">
            <h2 style="font-weight: 900; margin-bottom: 10px;">Réinitialisation</h2>
            <input type="email" id="reset-email" placeholder="Confirmez votre Email">
            <input type="password" id="reset-new-pass" placeholder="Nouveau mot de passe">
            <button onclick="handlePasswordReset()" class="btn-primary">Mettre à jour</button>
            <p style="font-size: 0.8rem; color: #444; margin-top: 20px;"><span onclick="switchStep('step-login')" style="color: var(--accent); cursor: pointer;">Annuler</span></p>
        </div>
        <button onclick="closeAuth()" style="background:none; border:none; color:#444; margin-top:20px; cursor:pointer; font-weight:700;">FERMER</button>
    </div>
</div>

<dialog id="bookingModal">
    <div id="modalNew">
        <h2 style="margin-top: 0;">Réserver</h2>
        <input type="email" id="userEmail" placeholder="votre@email.com">
        <button onclick="confirmBooking()" class="btn-action">CONFIRMER LE RDV</button>
    </div>
    <div id="modalExisting" style="display:none; text-align: center;">
        <h2>Session prête</h2>
        <button onclick="startVisio()" class="btn-action" style="background: var(--success);">REJOINDRE LA VISIO 🚀</button>
        <button onclick="cancelBooking()" style="background:none; border:none; color:var(--danger); margin-top:20px; cursor:pointer; font-weight:700; width:100%;">ANNULER LE RDV</button>
    </div>
    <button onclick="document.getElementById('bookingModal').close()" style="background:none; border:none; color:#444; width:100%; margin-top:20px; cursor:pointer;">Fermer</button>
</dialog>

<div id="visio-container">
    <div id="meet" style="height: 100%; width: 100%;"></div>
    <button style="position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--danger); color: white; border: none; padding: 15px 30px; border-radius: 20px; cursor: pointer; font-weight: 800;" onclick="stopVisio()">QUITTER</button>
</div>

<script>
    const NOW = new Date(); 
    let currentViewDate = new Date(NOW.getFullYear(), NOW.getMonth(), 1);
    let selectedISO = "";
    let selectedDateObj = null;
    let jitsiApi = null;

    // --- GLOW MOUSE ---
    window.addEventListener('mousemove', (e) => { 
        const glow = document.getElementById('glow');
        glow.style.left = e.clientX + 'px'; 
        glow.style.top = e.clientY + 'px';
    });

    // --- AUTH ---
    function switchStep(id) {
        ['step-login', 'step-register', 'step-forgot'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function openAuth() { document.getElementById('auth-overlay').style.display = 'flex'; }
    function closeAuth() { document.getElementById('auth-overlay').style.display = 'none'; }

    function updateNav() {
        const user = localStorage.getItem('userAccountEmail');
        const btn = document.querySelector('.btn-login-nav');
        if (user && btn) {
            const name = localStorage.getItem('userAccountName') || user.split('@')[0];
            btn.innerText = name.split(' ')[0].toUpperCase();
            btn.onclick = () => window.location.href = "espace-client.html";
        }
    }

    function handleLogin() {
        const u = document.getElementById('login-user').value.trim().toLowerCase();
        const p = document.getElementById('login-pass').value;
        if (u === "admin@devpro.pro" && p === "DevPro2026") {
            localStorage.setItem('userAccountEmail', u);
            window.location.href = "admin.html"; return;
        }
        if (localStorage.getItem('userPass_' + u) === p) { successLogin(u); }
        else { alert("Identifiants incorrects."); }
    }

    function handleRegister() {
        const e = document.getElementById('reg-email').value.trim().toLowerCase();
        const p = document.getElementById('reg-password').value;
        const n = document.getElementById('reg-name').value.trim();
        if (e && p.length >= 6 && n) {
            localStorage.setItem('userPass_' + e, p);
            localStorage.setItem('userAccountName', n);
            successLogin(e);
        } else { alert("Données invalides (6 car. min)."); }
    }

    function handlePasswordReset() {
        const email = document.getElementById('reset-email').value.trim().toLowerCase();
        const newPass = document.getElementById('reset-new-pass').value;
        if (localStorage.getItem('userPass_' + email)) {
            localStorage.setItem('userPass_' + email, newPass);
            alert("Mot de passe mis à jour !");
            switchStep('step-login');
        } else { alert("Compte inconnu."); }
    }

    function successLogin(email) {
        localStorage.setItem('userAccountEmail', email);
        confetti({ particleCount: 150, spread: 70 });
        setTimeout(() => { updateNav(); closeAuth(); }, 1000);
    }

    // --- CALENDRIER ---
    function renderCalendar() {
        const grid = document.getElementById("daysGrid");
        grid.innerHTML = "";
        const year = currentViewDate.getFullYear(), month = currentViewDate.getMonth();
        document.getElementById("monthDisplay").innerText = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(currentViewDate);
        
        ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'].forEach(day => {
            const h = document.createElement("div"); h.className = "grid-header"; h.innerText = day; grid.appendChild(h);
        });

        let firstDay = new Date(year, month, 1).getDay();
        const offset = (firstDay === 0) ? 6 : firstDay - 1;
        for (let i = 0; i < offset; i++) grid.appendChild(document.createElement("div"));

        for (let i = 1; i <= new Date(year, month + 1, 0).getDate(); i++) {
            const date = new Date(year, month, i);
            const iso = date.toISOString().split('T')[0];
            const dayEl = document.createElement("div"); 
            dayEl.innerText = i;
            const today = new Date(NOW.getFullYear(), NOW.getMonth(), NOW.getDate());

            if (date < today || date.getDay() === 0 || date.getDay() === 6) {
                dayEl.classList.add("disabled");
            } else {
                dayEl.onclick = () => { 
                    document.querySelectorAll('#daysGrid div').forEach(d => d.classList.remove('selected'));
                    dayEl.classList.add('selected');
                    selectedISO = iso;
                    selectedDateObj = date;
                    document.getElementById("bookingForm").style.display = "block";
                    document.getElementById("selectedDateText").innerText = date.toLocaleDateString('fr-FR', {day:'numeric', month:'long'});
                    renderSlots();
                };
            }
            grid.appendChild(dayEl);
        }
    }

    function renderSlots() {
        const grid = document.getElementById("timeSlotGrid");
        grid.innerHTML = "";
        ["09:00", "11:00", "14:00", "16:00"].forEach(time => {
            const btn = document.createElement("button");
            btn.className = "time-btn";
            const isBooked = localStorage.getItem(`rdv-${selectedISO}-${time}`);
            btn.innerHTML = isBooked ? `Ma Session ✅` : time;
            if (isBooked) btn.classList.add("booked");
            
            btn.onclick = () => {
                window.tempTime = time;
                const loggedUser = localStorage.getItem('userAccountEmail');
                if(loggedUser) document.getElementById("userEmail").value = loggedUser;
                document.getElementById("modalNew").style.display = isBooked ? "none" : "block";
                document.getElementById("modalExisting").style.display = isBooked ? "block" : "none";
                document.getElementById("bookingModal").showModal();
            };
            grid.appendChild(btn);
        });
    }

    function confirmBooking() {
        const email = document.getElementById("userEmail").value;
        if (!email.includes('@')) return alert("Email invalide");
        localStorage.setItem(`rdv-${selectedISO}-${window.tempTime}`, email);
        alert("Confirmé !");
        document.getElementById("bookingModal").close();
        renderSlots();
    }

    function cancelBooking() {
        if (confirm("Annuler ce RDV ?")) {
            localStorage.removeItem(`rdv-${selectedISO}-${window.tempTime}`);
            document.getElementById("bookingModal").close();
            renderSlots();
        }
    }

    function startVisio() {
        document.getElementById("bookingModal").close();
        document.getElementById("main-ui").style.display = "none";
        document.querySelector('nav').style.display = "none";
        document.getElementById("visio-container").style.display = "block";
        jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", {
            roomName: `DevPro-Secure-${selectedISO}-${window.tempTime.replace(':','h')}`,
            parentNode: document.querySelector('#meet')
        });
    }

    function stopVisio() { location.reload(); }
    function changeMonth(dir) { currentViewDate.setMonth(currentViewDate.getMonth() + dir); renderCalendar(); }

    window.onload = () => {
        renderCalendar();
        updateNav();
    };
</script>
</body>
</html>
